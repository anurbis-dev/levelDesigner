<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Split-tree прототип</title>
<style>
  :root {
    --bg: #111318;
    --panel-border: #262a35;
    --accent: #3b82f6;
    --accent-green: #22c55e;
    --text: #d4d8e0;
    --text-dim: #8a90a0;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 13px/1.4 -apple-system, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  #toolbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: #171a21;
    border-bottom: 1px solid var(--panel-border);
    position: relative;
    z-index: 50;
    flex-wrap: wrap;
  }
  #toolbar .label { color: var(--text-dim); margin-right: 4px; }
  .chip {
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid var(--panel-border);
    background: #1d212b;
    color: var(--text);
    font-size: 12px;
    cursor: grab;
    user-select: none;
    touch-action: none;
  }
  .chip:active { cursor: grabbing; }
  #toolbar button.action {
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid var(--panel-border);
    background: #1d212b;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
  }
  #toolbar button.action:hover { border-color: var(--accent); }
  #toolbar .spacer { flex: 1 1 auto; }

  #workspace {
    flex: 1 1 0;
    min-height: 0;
    position: relative;
  }

  #split-root {
    position: absolute;
    inset: 0;
    display: flex;
  }

  .empty-drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 12px;
    border: 2px dashed var(--panel-border);
    margin: 6px;
    text-align: center;
    padding: 8px;
  }

  .split-node {
    display: flex;
    flex: 1 1 0;
    min-width: 0;
    min-height: 0;
  }

  .resizer { flex: 0 0 auto; background: var(--panel-border); position: relative; z-index: 2; touch-action: none; }
  .resizer-col { width: 4px; cursor: col-resize; }
  .resizer-row { height: 4px; cursor: row-resize; }
  .resizer:hover, .resizer.active { background: var(--accent); }

  .leaf-node {
    display: flex;
    flex-direction: column;
    flex: 1 1 0;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    border: 1px solid var(--panel-border);
  }
  .leaf-header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 6px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
    background: rgba(0,0,0,0.25);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .leaf-header .drag-handle {
    cursor: grab;
    padding: 2px 4px;
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    touch-action: none;
  }
  .leaf-header .drag-handle:active { cursor: grabbing; }
  .leaf-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .icon-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    line-height: 1;
    padding: 3px 5px;
    border-radius: 3px;
    flex: 0 0 auto;
  }
  .icon-btn:hover { color: var(--text); background: rgba(255,255,255,0.08); }
  .icon-btn.close:hover { color: #f87171; }

  .type-caret { font-size: 9px; color: var(--text-dim); margin-left: 2px; }

  .leaf-body {
    flex: 1 1 0;
    position: relative;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .drop-overlay {
    position: fixed;
    display: none;
    background: rgba(59,130,246,0.28);
    border: 2px solid var(--accent);
    pointer-events: none;
    z-index: 400;
  }
  .snap-edge-overlay {
    position: fixed;
    display: none;
    background: var(--accent-green);
    box-shadow: 0 0 10px 2px rgba(34,197,94,0.75);
    pointer-events: none;
    z-index: 410;
    border-radius: 2px;
  }

  .drag-ghost {
    position: fixed;
    display: none;
    pointer-events: none;
    background: #1b1f28;
    border: 1px solid var(--accent);
    color: var(--text);
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 5px;
    z-index: 450;
    white-space: nowrap;
    box-shadow: 0 6px 16px rgba(0,0,0,0.4);
  }

  .rename-input {
    background: #0f1420;
    border: 1px solid var(--accent);
    color: var(--text);
    font: inherit;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 3px;
    width: 100%;
    min-width: 50px;
  }

  .type-menu {
    position: fixed;
    background: #1b1f28;
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 4px;
    z-index: 500;
    min-width: 140px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .type-menu .item {
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .type-menu .item:hover { background: rgba(59,130,246,0.18); }
  .type-menu .swatch { width: 10px; height: 10px; border-radius: 2px; flex: 0 0 auto; }

  #floating-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 100;
  }
  .floating-window {
    position: absolute;
    pointer-events: auto;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--accent);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 14px 34px rgba(0,0,0,0.5);
    background: var(--bg);
  }
  .floating-window.grouped { border-color: var(--accent-green); }
  .floating-chrome {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 6px 6px 10px;
    background: linear-gradient(180deg, rgba(59,130,246,0.22), rgba(59,130,246,0.06));
    border-bottom: 1px solid var(--panel-border);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: grab;
    touch-action: none;
    border-radius: 8px 8px 0 0;
  }
  .floating-window.grouped .floating-chrome { background: linear-gradient(180deg, rgba(34,197,94,0.22), rgba(34,197,94,0.06)); }
  .floating-chrome:active { cursor: grabbing; }
  .floating-chrome .title { flex: 0 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .floating-chrome .chrome-spacer { flex: 1 1 auto; min-width: 4px; align-self: stretch; }
  .floating-window.collapsed .floating-chrome { border-radius: 8px; border-bottom: none; }
  .floating-body {
    flex: 1 1 0;
    position: relative;
    display: flex;
    min-height: 0;
  }
  .resize-corner {
    position: absolute;
    right: 0; bottom: 0;
    width: 20px; height: 20px;
    cursor: nwse-resize;
    background: linear-gradient(135deg, transparent 50%, var(--accent) 50%);
    opacity: 0.6;
    touch-action: none;
    z-index: 3;
  }

  #json-panel {
    flex: 0 0 auto;
    max-height: 26vh;
    overflow: auto;
    background: #0b0d12;
    border-top: 1px solid var(--panel-border);
    padding: 8px 12px;
    display: none;
  }
  #json-panel.open { display: block; }
  #json-panel pre {
    margin: 0;
    font: 11px/1.4 "SF Mono", Consolas, monospace;
    color: #93c5fd;
    white-space: pre-wrap;
  }
</style>
</head>
<body>

  <div id="toolbar">
    <span class="label">Перетащить на грань панели →</span>
    <div class="chip" data-new="viewport" data-label="Viewport">+ Viewport</div>
    <div class="chip" data-new="outliner" data-label="Outliner">+ Outliner</div>
    <div class="chip" data-new="details" data-label="Details">+ Details</div>
    <div class="chip" data-new="layers" data-label="Layers">+ Layers</div>
    <div class="chip" data-new="assets" data-label="Assets">+ Assets</div>
    <div class="spacer"></div>
    <button class="action" id="toggle-json">Показать JSON дерева</button>
    <button class="action" id="reset-layout">Сбросить layout</button>
  </div>

  <div id="workspace">
    <div id="split-root"></div>
    <div id="floating-layer"></div>
  </div>

  <div id="json-panel"><pre id="json-view"></pre></div>

<script>
(function(){
  const TYPE_META = {
    viewport: { label: 'Viewport', color: '#1e293b' },
    outliner: { label: 'Outliner', color: '#312e5b' },
    details:  { label: 'Details',  color: '#5b2e2e' },
    layers:   { label: 'Layers',   color: '#1f4d33' },
    assets:   { label: 'Assets',   color: '#5b4a1f' },
  };
  const TYPE_ORDER = ['viewport', 'outliner', 'details', 'layers', 'assets'];

  const FLOAT_MIN_W = 130;
  const FLOAT_MIN_H = 60;
  const COLLAPSED_H = 28; // approx. chrome-only height, used to cascade attached neighbors
  const SNAP_THRESHOLD = 16;
  const HOLD_MS = 500;
  const DOUBLE_TAP_MS = 350;
  const TAP_DELAY_MS = 260;
  const OPPOSITE = { left: 'right', right: 'left', top: 'bottom', bottom: 'top' };

  let idCounter = 1;
  function makeLeaf(contentType, label) {
    return { type: 'leaf', id: 'leaf-' + (idCounter++), contentType, label };
  }
  function defaultMainTree() {
    idCounter = 1;
    return {
      type: 'split', direction: 'row', ratio: 0.22,
      children: [
        makeLeaf('outliner', 'Outliner'),
        {
          type: 'split', direction: 'row', ratio: 0.66,
          children: [
            makeLeaf('viewport', 'Viewport'),
            {
              type: 'split', direction: 'column', ratio: 0.55,
              children: [ makeLeaf('details', 'Details'), makeLeaf('layers', 'Layers') ]
            }
          ]
        }
      ]
    };
  }

  // ---------- workspace model ----------
  let mainTree = defaultMainTree();
  let floatingWindows = []; // { id, tree, x, y, w, h, z, collapsed, customName, groupId, attach:{left,right,top,bottom} }
  let nextZ = 10;
  let floatIdCounter = 1;
  let nextGroupId = 1;

  function makeFloatingWindow(tree, x, y, w, h) {
    return {
      id: 'float-' + (floatIdCounter++), tree,
      x, y, w: Math.max(FLOAT_MIN_W, w), h: Math.max(FLOAT_MIN_H, h),
      z: nextZ++, collapsed: false, customName: null, groupId: null,
      attach: { left: null, right: null, top: null, bottom: null },
    };
  }
  function effectiveHeight(f) {
    if (!f.collapsed) return f.h;
    const chromeEl = floatingLayer.querySelector('.floating-window[data-float-id="' + f.id + '"] .floating-chrome');
    return chromeEl ? chromeEl.getBoundingClientRect().height : COLLAPSED_H;
  }

  function getTreeOf(workspaceId) {
    if (workspaceId === 'main') return mainTree;
    const fw = floatingWindows.find(f => f.id === workspaceId);
    return fw ? fw.tree : null;
  }
  function setTreeOf(workspaceId, newTree) {
    if (workspaceId === 'main') { mainTree = newTree; return; }
    const fw = floatingWindows.find(f => f.id === workspaceId);
    if (!fw) return;
    if (newTree === null) floatingWindows = floatingWindows.filter(f => f.id !== workspaceId);
    else fw.tree = newTree;
  }
  function findWorkspaceContaining(leafId) {
    if (findNode(mainTree, leafId)) return 'main';
    for (const fw of floatingWindows) if (findNode(fw.tree, leafId)) return fw.id;
    return null;
  }

  const splitRoot = document.getElementById('split-root');
  const floatingLayer = document.getElementById('floating-layer');
  const jsonView = document.getElementById('json-view');

  function updateJson() { jsonView.textContent = JSON.stringify({ mainTree, floatingWindows }, null, 2); }

  // ---------- generic tree helpers (workspace-agnostic) ----------
  function findNode(node, id) {
    if (!node) return null;
    if (node.type === 'leaf') return node.id === id ? node : null;
    for (const c of node.children) { const f = findNode(c, id); if (f) return f; }
    return null;
  }
  function removeLeaf(node, id) {
    if (!node) return null;
    if (node.type === 'leaf') return node.id === id ? null : node;
    const kept = node.children.map(c => removeLeaf(c, id)).filter(c => c !== null);
    if (kept.length === 1) return kept[0];
    if (kept.length === 0) return null;
    node.children = kept;
    return node;
  }
  function replaceLeaf(node, targetId, replacement) {
    if (!node) return node;
    if (node.type === 'leaf') return node.id === targetId ? replacement : node;
    node.children = node.children.map(c => replaceLeaf(c, targetId, replacement));
    return node;
  }
  function insertIntoTree(workspaceId, node, targetId, zone) {
    const current = getTreeOf(workspaceId);
    if (!current) { setTreeOf(workspaceId, node); return; }
    if (!targetId || zone === 'center') return;
    const targetNode = findNode(current, targetId);
    if (!targetNode) return;
    const direction = (zone === 'left' || zone === 'right') ? 'row' : 'column';
    const children = (zone === 'left' || zone === 'top') ? [node, targetNode] : [targetNode, node];
    const newSplit = { type: 'split', direction, ratio: 0.5, children };
    const updated = (current.type === 'leaf' && current.id === targetId)
      ? newSplit
      : replaceLeaf(current, targetId, newSplit);
    setTreeOf(workspaceId, updated);
  }
  function resolveDraggedNode(raw) {
    if (!raw) return null;
    if (raw.indexOf('new:') === 0) {
      const parts = raw.split(':');
      return makeLeaf(parts[1], parts[2]);
    }
    let found = findNode(mainTree, raw);
    if (found) { setTreeOf('main', removeLeaf(mainTree, raw)); return found; }
    for (const fw of floatingWindows) {
      found = findNode(fw.tree, raw);
      if (found) { setTreeOf(fw.id, removeLeaf(fw.tree, raw)); return found; }
    }
    return null;
  }

  // ---------- localized refresh (avoid tearing down the whole app for small changes) ----------
  function refreshFloatingWindow(fw) {
    const oldEl = floatingLayer.querySelector('.floating-window[data-float-id="' + fw.id + '"]');
    const newEl = renderFloatingWindow(fw);
    if (oldEl) oldEl.replaceWith(newEl); else floatingLayer.appendChild(newEl);
  }
  function syncFloatingDom(f) {
    const el = floatingLayer.querySelector('.floating-window[data-float-id="' + f.id + '"]');
    if (!el) return;
    el.style.left = f.x + 'px'; el.style.top = f.y + 'px';
    el.style.width = f.w + 'px';
    if (!f.collapsed) el.style.height = f.h + 'px';
  }
  function refreshWorkspace(workspaceId) {
    if (workspaceId === 'main') { renderWorkspace('main', mainTree, splitRoot); }
    else {
      const fw = floatingWindows.find(f => f.id === workspaceId);
      if (fw) refreshFloatingWindow(fw); else renderFloatingLayer();
    }
    updateJson();
  }

  // ---------- dock-into-tree targeting, shared by pane-header drag, chip drag and floating-window drag ----------
  let dockOverlay = null;
  function getDockOverlay() {
    if (!dockOverlay) { dockOverlay = document.createElement('div'); dockOverlay.className = 'drop-overlay'; document.body.appendChild(dockOverlay); }
    return dockOverlay;
  }
  function computeZone(clientX, clientY, rect) {
    const px = (clientX - rect.left) / rect.width;
    const py = (clientY - rect.top) / rect.height;
    if (px < 0.25) return 'left';
    if (px > 0.75) return 'right';
    if (py < 0.25) return 'top';
    if (py > 0.75) return 'bottom';
    return 'center';
  }
  function positionOverlayRect(overlay, rect) {
    overlay.style.display = 'block';
    overlay.style.left = rect.left + 'px'; overlay.style.top = rect.top + 'px';
    overlay.style.width = rect.width + 'px'; overlay.style.height = rect.height + 'px';
  }
  function positionOverlayZone(overlay, zone, rect) {
    if (zone === 'center') { overlay.style.display = 'none'; return; }
    overlay.style.display = 'block';
    if (zone === 'left')   { overlay.style.left=rect.left+'px'; overlay.style.top=rect.top+'px'; overlay.style.width=rect.width/2+'px'; overlay.style.height=rect.height+'px'; }
    if (zone === 'right')  { overlay.style.left=(rect.left+rect.width/2)+'px'; overlay.style.top=rect.top+'px'; overlay.style.width=rect.width/2+'px'; overlay.style.height=rect.height+'px'; }
    if (zone === 'top')    { overlay.style.left=rect.left+'px'; overlay.style.top=rect.top+'px'; overlay.style.width=rect.width+'px'; overlay.style.height=rect.height/2+'px'; }
    if (zone === 'bottom') { overlay.style.left=rect.left+'px'; overlay.style.top=(rect.top+rect.height/2)+'px'; overlay.style.width=rect.width+'px'; overlay.style.height=rect.height/2+'px'; }
  }
  function detectDropTarget(clientX, clientY, hiddenEl) {
    if (hiddenEl) hiddenEl.style.pointerEvents = 'none';
    const under = document.elementFromPoint(clientX, clientY);
    if (hiddenEl) hiddenEl.style.pointerEvents = '';
    const bodyUnder = under ? under.closest('.leaf-body') : null;
    if (bodyUnder) {
      const leafId = bodyUnder.dataset.leafId;
      const rect = bodyUnder.getBoundingClientRect();
      const zone = computeZone(clientX, clientY, rect);
      if (leafId && zone !== 'center') return { kind: 'leaf', leafId, zone, rect };
      return null;
    }
    const emptyUnder = under ? under.closest('.empty-drop-zone') : null;
    if (emptyUnder) return { kind: 'empty', workspaceId: emptyUnder.dataset.workspaceId, rect: emptyUnder.getBoundingClientRect() };
    return null;
  }
  function showDockOverlayFor(target) {
    const overlay = getDockOverlay();
    if (!target) { overlay.style.display = 'none'; return; }
    if (target.kind === 'leaf') positionOverlayZone(overlay, target.zone, target.rect);
    else positionOverlayRect(overlay, target.rect);
  }
  function applyDropTarget(target, node) {
    if (target.kind === 'empty') { insertIntoTree(target.workspaceId, node, null, null); return; }
    const ws = findWorkspaceContaining(target.leafId);
    if (ws) insertIntoTree(ws, node, target.leafId, target.zone);
  }

  // ---------- floating-window-to-floating-window edge snapping/grouping ----------
  function workspaceRect() { return document.getElementById('workspace').getBoundingClientRect(); }
  function floatingRectPx(f) {
    const ws = workspaceRect();
    return { left: ws.left + f.x, top: ws.top + f.y, right: ws.left + f.x + f.w, bottom: ws.top + f.y + effectiveHeight(f) };
  }
  // Workspace-local (not viewport) rects — used for the snap-detection math
  // itself, kept separate from floatingRectPx which is for on-screen overlay positioning.
  function localRect(f) { return { left: f.x, top: f.y, right: f.x + f.w, bottom: f.y + effectiveHeight(f) }; }
  function groupBoundingBoxLocal(fw) {
    const members = fw.groupId ? floatingWindows.filter(f => f.groupId === fw.groupId) : [fw];
    let left = Infinity, top = Infinity, right = -Infinity, bottom = -Infinity;
    members.forEach(f => {
      const r = localRect(f);
      left = Math.min(left, r.left); top = Math.min(top, r.top);
      right = Math.max(right, r.right); bottom = Math.max(bottom, r.bottom);
    });
    return { left, top, right, bottom };
  }
  // Detection uses the whole group's outer silhouette (not fw's own rect) so
  // an inner member of an L-shaped cluster can't trigger a snap that would
  // visually overlap something the group's actual boundary isn't near.
  function findFloatingSnapTarget(fw) {
    const a = groupBoundingBoxLocal(fw);
    for (const ow of floatingWindows) {
      if (ow.id === fw.id) continue;
      if (fw.groupId && ow.groupId === fw.groupId) continue;
      const b = localRect(ow);
      const vOverlap = Math.min(a.bottom, b.bottom) - Math.max(a.top, b.top);
      const hOverlap = Math.min(a.right, b.right) - Math.max(a.left, b.left);
      if (vOverlap > 24) {
        if (Math.abs(a.left - b.right) < SNAP_THRESHOLD) return { ow, side: 'left' };
        if (Math.abs(a.right - b.left) < SNAP_THRESHOLD) return { ow, side: 'right' };
      }
      if (hOverlap > 24) {
        if (Math.abs(a.top - b.bottom) < SNAP_THRESHOLD) return { ow, side: 'top' };
        if (Math.abs(a.bottom - b.top) < SNAP_THRESHOLD) return { ow, side: 'bottom' };
      }
    }
    return null;
  }
  let snapOverlayEl = null;
  function getSnapOverlay() {
    if (!snapOverlayEl) { snapOverlayEl = document.createElement('div'); snapOverlayEl.className = 'snap-edge-overlay'; document.body.appendChild(snapOverlayEl); }
    return snapOverlayEl;
  }
  function showSnapHighlight(fw, snap) {
    const ws = workspaceRect();
    const localA = groupBoundingBoxLocal(fw);
    const a = { left: ws.left + localA.left, top: ws.top + localA.top, right: ws.left + localA.right, bottom: ws.top + localA.bottom };
    const b = floatingRectPx(snap.ow);
    const overlay = getSnapOverlay();
    overlay.style.display = 'block';
    if (snap.side === 'left' || snap.side === 'right') {
      const x = snap.side === 'left' ? b.right : b.left;
      const top = Math.max(a.top, b.top), bottom = Math.min(a.bottom, b.bottom);
      overlay.style.left = (x - 2) + 'px'; overlay.style.top = top + 'px';
      overlay.style.width = '4px'; overlay.style.height = Math.max(20, bottom - top) + 'px';
    } else {
      const y = snap.side === 'top' ? b.bottom : b.top;
      const left = Math.max(a.left, b.left), right = Math.min(a.right, b.right);
      overlay.style.left = left + 'px'; overlay.style.top = (y - 2) + 'px';
      overlay.style.height = '4px'; overlay.style.width = Math.max(20, right - left) + 'px';
    }
  }
  function hideSnapHighlight() { if (snapOverlayEl) snapOverlayEl.style.display = 'none'; }
  function ensureAttach(f) { if (!f.attach) f.attach = { left: null, right: null, top: null, bottom: null }; return f.attach; }
  function applyFloatingSnap(fw, snap) {
    const ow = snap.ow;
    const preX = fw.x, preY = fw.y;
    if (snap.side === 'left')   { fw.x = ow.x + ow.w; fw.y = ow.y; fw.h = ow.h; }
    if (snap.side === 'right')  { fw.x = ow.x - fw.w; fw.y = ow.y; fw.h = ow.h; }
    if (snap.side === 'top')    { fw.y = ow.y + effectiveHeight(ow); fw.x = ow.x; fw.w = ow.w; }
    if (snap.side === 'bottom') { fw.y = ow.y - effectiveHeight(fw); fw.x = ow.x; fw.w = ow.w; }
    const dx = fw.x - preX, dy = fw.y - preY;

    // fw just got pulled to align with ow — drag the rest of fw's existing
    // group along by the same amount so the cluster doesn't tear apart.
    if (fw.groupId) {
      floatingWindows.forEach(f => {
        if (f.id !== fw.id && f.groupId === fw.groupId) { f.x += dx; f.y += dy; syncFloatingDom(f); }
      });
    }

    ensureAttach(fw)[snap.side] = ow.id;
    ensureAttach(ow)[OPPOSITE[snap.side]] = fw.id;
    attachFloating(fw, ow);
    syncFloatingDom(fw);

    // the size match (height for left/right, width for top/bottom) only
    // cascades along fw's own column/row — an L-shaped or other branching
    // cluster isn't distorted, its other branches were already dragged along above.
    if (snap.side === 'left' || snap.side === 'right') restackBottomChain(fw);
    else { verticalChainWidthSync(fw); restackRightChain(fw); }
  }
  function attachFloating(fw, ow) {
    const gid = fw.groupId || ow.groupId || ('grp-' + (nextGroupId++));
    const oldFwGid = fw.groupId, oldOwGid = ow.groupId;
    floatingWindows.forEach(f => {
      if (f.id === fw.id || f.id === ow.id || (oldFwGid && f.groupId === oldFwGid) || (oldOwGid && f.groupId === oldOwGid)) {
        f.groupId = gid;
      }
    });
  }
  function detachAttachLinks(fw) {
    const a = ensureAttach(fw);
    ['left', 'right', 'top', 'bottom'].forEach(side => {
      const nid = a[side];
      if (!nid) return;
      const n = floatingWindows.find(f => f.id === nid);
      if (n) ensureAttach(n)[OPPOSITE[side]] = null;
      a[side] = null;
    });
  }
  function detachFloating(fw) {
    detachAttachLinks(fw);
    const gid = fw.groupId;
    fw.groupId = null;
    if (!gid) return;
    const remaining = floatingWindows.filter(f => f.groupId === gid);
    if (remaining.length === 1) remaining[0].groupId = null;
  }
  // Keeps every window in fw's vertical (top/bottom) attach chain the same
  // width as fw, so a stack of docked windows always reads as one column.
  function verticalChainWidthSync(fw) {
    const visited = new Set([fw.id]);
    const queue = [fw];
    while (queue.length) {
      const cur = queue.shift();
      ['top', 'bottom'].forEach(side => {
        const nid = cur.attach && cur.attach[side];
        if (!nid || visited.has(nid)) return;
        const n = floatingWindows.find(f => f.id === nid);
        if (!n) return;
        n.w = fw.w; n.x = fw.x;
        visited.add(nid);
        syncFloatingDom(n);
        queue.push(n);
      });
    }
  }
  // Cascades downward from fw so whatever is attached below always sits
  // flush against fw's current (possibly just-collapsed or just-resized) edge.
  function restackBottomChain(startFw) {
    let current = startFw;
    const visited = new Set([startFw.id]);
    while (current.attach && current.attach.bottom) {
      const next = floatingWindows.find(f => f.id === current.attach.bottom);
      if (!next || visited.has(next.id)) break;
      next.y = current.y + effectiveHeight(current);
      syncFloatingDom(next);
      visited.add(next.id);
      current = next;
    }
  }
  // Mirrors restackBottomChain along the horizontal axis: full adhesion
  // instead of a hard clamp — a right-docked neighbor is pushed along (or
  // pulled back) to stay flush, rather than just blocking growth at a wall.
  function restackRightChain(startFw) {
    let current = startFw;
    const visited = new Set([startFw.id]);
    while (current.attach && current.attach.right) {
      const next = floatingWindows.find(f => f.id === current.attach.right);
      if (!next || visited.has(next.id)) break;
      next.x = current.x + current.w;
      syncFloatingDom(next);
      visited.add(next.id);
      current = next;
    }
  }

  // ---------- rename (floating windows only) ----------
  function startRename(titleEl, currentValue, onCommit) {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'rename-input';
    input.value = currentValue || '';
    input.addEventListener('pointerdown', (e) => e.stopPropagation());
    input.addEventListener('click', (e) => e.stopPropagation());
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { input.value = currentValue; input.blur(); }
    });
    input.addEventListener('blur', () => { onCommit(input.value.trim()); render(); });
    titleEl.replaceWith(input);
    input.focus();
    input.select();
  }

  // ---------- generic pointer-based drag: pane headers & toolbar chips ----------
  function startNodeDrag(e, getRawPayload, opts) {
    e.preventDefault();
    const captureEl = e.currentTarget;
    const pointerId = e.pointerId;
    captureEl.setPointerCapture(pointerId);
    const startX = e.clientX, startY = e.clientY;
    let moved = false, target = null, ghost = null, holdFired = false;

    function clearHold() { if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; } }
    function endGesture() {
      clearHold();
      try { captureEl.releasePointerCapture(pointerId); } catch (err) {}
      captureEl.removeEventListener('pointermove', onMove);
      captureEl.removeEventListener('pointerup', onUp);
      if (dockOverlay) dockOverlay.style.display = 'none';
      if (ghost) { ghost.remove(); ghost = null; }
    }
    let holdTimer = opts.onHold ? setTimeout(() => { holdFired = true; endGesture(); opts.onHold(); }, HOLD_MS) : null;

    function onMove(ev) {
      const dx = ev.clientX - startX, dy = ev.clientY - startY;
      if (!moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
        moved = true;
        clearHold();
        ghost = document.createElement('div');
        ghost.className = 'drag-ghost';
        ghost.textContent = opts.ghostLabel || '';
        ghost.style.display = 'block';
        document.body.appendChild(ghost);
      }
      if (!moved) return;
      ghost.style.left = (ev.clientX + 14) + 'px';
      ghost.style.top = (ev.clientY + 14) + 'px';
      target = detectDropTarget(ev.clientX, ev.clientY, ghost);
      showDockOverlayFor(target);
    }
    function onUp(ev) {
      if (holdFired) return;
      endGesture();
      if (moved && target) {
        if (opts.ownId && target.kind === 'leaf' && target.leafId === opts.ownId) {
          const original = findNode(mainTree, opts.ownId)
            || floatingWindows.reduce((acc, fw) => acc || findNode(fw.tree, opts.ownId), null);
          if (original) {
            const dup = makeLeaf(original.contentType, original.label);
            applyDropTarget(target, dup);
            render();
          }
        } else {
          const raw = getRawPayload();
          const node = resolveDraggedNode(raw);
          if (node) { applyDropTarget(target, node); render(); }
        }
      } else if (moved && !target) {
        if (opts.onNoTargetDrop) opts.onNoTargetDrop(ev.clientX, ev.clientY);
      } else if (!moved) {
        const now = Date.now();
        const last = captureEl._lastTapTime || 0;
        if (opts.onDoubleTap && (now - last) < DOUBLE_TAP_MS) {
          captureEl._lastTapTime = 0;
          if (captureEl._tapTimer) { clearTimeout(captureEl._tapTimer); captureEl._tapTimer = null; }
          opts.onDoubleTap();
        } else {
          captureEl._lastTapTime = now;
          if (opts.onTap) {
            captureEl._tapTimer = setTimeout(() => { captureEl._tapTimer = null; opts.onTap(); }, opts.onDoubleTap ? TAP_DELAY_MS : 0);
          }
        }
      }
    }
    captureEl.addEventListener('pointermove', onMove);
    captureEl.addEventListener('pointerup', onUp);
  }

  // ---------- render ----------
  function render() {
    renderWorkspace('main', mainTree, splitRoot);
    renderFloatingLayer();
    updateJson();
  }

  function renderWorkspace(workspaceId, treeNode, containerEl) {
    containerEl.innerHTML = '';
    if (!treeNode) {
      const empty = document.createElement('div');
      empty.className = 'empty-drop-zone';
      empty.dataset.workspaceId = workspaceId;
      empty.textContent = workspaceId === 'main' ? 'Область пуста — перетащите сюда панель' : 'Пусто';
      containerEl.appendChild(empty);
      return;
    }
    containerEl.appendChild(renderNode(treeNode, workspaceId));
  }

  function renderNode(node, workspaceId) {
    if (node.type === 'leaf') return renderLeaf(node, workspaceId);
    const el = document.createElement('div');
    el.className = 'split-node';
    el.style.flexDirection = node.direction === 'row' ? 'row' : 'column';
    const a = renderNode(node.children[0], workspaceId);
    const b = renderNode(node.children[1], workspaceId);
    a.style.flex = `${node.ratio} 1 0`;
    b.style.flex = `${1 - node.ratio} 1 0`;
    const resizer = document.createElement('div');
    resizer.className = 'resizer ' + (node.direction === 'row' ? 'resizer-col' : 'resizer-row');
    setupResizer(resizer, node, el, a, b);
    el.appendChild(a); el.appendChild(resizer); el.appendChild(b);
    return el;
  }

  function setupResizer(resizer, node, container, elA, elB) {
    resizer.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      resizer.setPointerCapture(e.pointerId);
      resizer.classList.add('active');
      document.body.style.userSelect = 'none';
      document.body.style.cursor = node.direction === 'row' ? 'col-resize' : 'row-resize';
      const rect = container.getBoundingClientRect();
      const total = node.direction === 'row' ? rect.width : rect.height;
      const start = node.direction === 'row' ? rect.left : rect.top;
      function onMove(ev) {
        const pos = node.direction === 'row' ? ev.clientX : ev.clientY;
        let ratio = Math.max(0.08, Math.min(0.92, (pos - start) / total));
        elA.style.flex = `${ratio} 1 0`; elB.style.flex = `${1 - ratio} 1 0`;
        node._pendingRatio = ratio;
      }
      function onUp(ev) {
        if (node._pendingRatio !== undefined) node.ratio = node._pendingRatio;
        resizer.classList.remove('active');
        document.body.style.userSelect = ''; document.body.style.cursor = '';
        resizer.releasePointerCapture(ev.pointerId);
        resizer.removeEventListener('pointermove', onMove);
        resizer.removeEventListener('pointerup', onUp);
        updateJson();
      }
      resizer.addEventListener('pointermove', onMove);
      resizer.addEventListener('pointerup', onUp);
    });
  }

  // ---------- pane header ----------
  function buildHeader(node, workspaceId, opts) {
    const header = document.createElement('div');
    header.className = 'leaf-header';
    const handle = document.createElement('div');
    handle.className = 'drag-handle';
    const title = document.createElement('span');
    title.className = 'leaf-title';
    title.textContent = TYPE_META[node.contentType] ? TYPE_META[node.contentType].label : node.contentType;
    handle.appendChild(title);
    const caret = document.createElement('span');
    caret.className = 'type-caret';
    caret.textContent = '▾';
    handle.appendChild(caret);

    handle.addEventListener('pointerdown', (e) => {
      const onText = e.target === title || title.contains(e.target);
      startNodeDrag(e, () => node.id, {
        ghostLabel: TYPE_META[node.contentType] ? TYPE_META[node.contentType].label : node.contentType,
        ownId: node.id,
        onTap: onText ? () => openTypeMenu(handle, node.contentType, (newType) => { node.contentType = newType; refreshWorkspace(workspaceId); }) : undefined,
        onNoTargetDrop: (x, y) => {
          const dragged = resolveDraggedNode(node.id);
          if (!dragged) return;
          floatingWindows.push(makeFloatingWindow(dragged, x - 70, y - 14, 220, 160));
          render();
        },
      });
    });
    header.appendChild(handle);

    if (opts.onDetach) {
      const detachBtn = document.createElement('button');
      detachBtn.className = 'icon-btn';
      detachBtn.title = 'Открепить в плавающее окно';
      detachBtn.textContent = '⇱';
      detachBtn.addEventListener('click', (e) => { e.stopPropagation(); opts.onDetach(); });
      header.appendChild(detachBtn);
    }
    if (opts.onClose) {
      const closeBtn = document.createElement('button');
      closeBtn.className = 'icon-btn close';
      closeBtn.title = 'Закрыть';
      closeBtn.textContent = '×';
      closeBtn.addEventListener('click', (e) => { e.stopPropagation(); opts.onClose(); });
      header.appendChild(closeBtn);
    }
    return header;
  }

  function openTypeMenu(anchor, currentType, onSelect) {
    closeTypeMenu();
    const rect = anchor.getBoundingClientRect();
    const menu = document.createElement('div');
    menu.className = 'type-menu';
    menu.style.left = rect.left + 'px';
    menu.style.top = (rect.bottom + 4) + 'px';
    TYPE_ORDER.forEach(type => {
      const item = document.createElement('div');
      item.className = 'item';
      const swatch = document.createElement('span');
      swatch.className = 'swatch';
      swatch.style.background = TYPE_META[type].color;
      item.appendChild(swatch);
      const label = document.createElement('span');
      label.textContent = TYPE_META[type].label + (type === currentType ? ' ✓' : '');
      item.appendChild(label);
      item.addEventListener('click', (e) => { e.stopPropagation(); closeTypeMenu(); onSelect(type); });
      menu.appendChild(item);
    });
    document.body.appendChild(menu);
    setTimeout(() => document.addEventListener('pointerdown', onOutsideClick), 0);
    function onOutsideClick(e) { if (!menu.contains(e.target)) closeTypeMenu(); }
    menu._cleanup = () => document.removeEventListener('pointerdown', onOutsideClick);
    window._activeTypeMenu = menu;
  }
  function closeTypeMenu() {
    if (window._activeTypeMenu) { window._activeTypeMenu._cleanup(); window._activeTypeMenu.remove(); window._activeTypeMenu = null; }
  }

  // ---------- leaf ----------
  function renderLeaf(node, workspaceId) {
    const el = document.createElement('div');
    el.className = 'leaf-node';
    const header = buildHeader(node, workspaceId, {
      onDetach: () => detachLeafToFloating(workspaceId, node.id, el),
      onClose: () => closePane(workspaceId, node.id),
    });
    const body = document.createElement('div');
    body.className = 'leaf-body';
    body.dataset.leafId = node.id;
    body.style.background = TYPE_META[node.contentType] ? TYPE_META[node.contentType].color : '#333';
    body.textContent = node.contentType;
    el.appendChild(header); el.appendChild(body);
    return el;
  }

  function closePane(workspaceId, id) {
    const current = getTreeOf(workspaceId);
    setTreeOf(workspaceId, removeLeaf(current, id));
    render();
  }

  function detachLeafToFloating(workspaceId, id, leafEl) {
    const current = getTreeOf(workspaceId);
    const node = findNode(current, id);
    if (!node) return;
    const rect = leafEl.getBoundingClientRect();
    setTreeOf(workspaceId, removeLeaf(current, id));
    floatingWindows.push(makeFloatingWindow(node, rect.left + 24, rect.top + 24, rect.width * 0.6, rect.height * 0.6));
    render();
  }

  // ---------- floating windows ----------
  function renderFloatingLayer() {
    floatingLayer.innerHTML = '';
    floatingWindows.forEach(fw => floatingLayer.appendChild(renderFloatingWindow(fw)));
  }

  function renderFloatingWindow(fw) {
    const el = document.createElement('div');
    el.className = 'floating-window' + (fw.collapsed ? ' collapsed' : '') + (fw.groupId ? ' grouped' : '');
    el.dataset.floatId = fw.id;
    el.style.left = fw.x + 'px'; el.style.top = fw.y + 'px';
    el.style.width = fw.w + 'px';
    el.style.height = fw.collapsed ? 'auto' : fw.h + 'px';
    el.style.zIndex = fw.z;
    el.addEventListener('pointerdown', () => { fw.z = nextZ++; el.style.zIndex = fw.z; });

    const chrome = document.createElement('div');
    chrome.className = 'floating-chrome';
    const arrow = document.createElement('span');
    arrow.className = 'arrow';
    arrow.textContent = fw.collapsed ? '▸' : '▾';
    chrome.appendChild(arrow);
    const title = document.createElement('span');
    title.className = 'title';
    title.textContent = fw.customName || 'окно';
    chrome.appendChild(title);
    const spacer = document.createElement('span');
    spacer.className = 'chrome-spacer';
    chrome.appendChild(spacer);
    const closeAllBtn = document.createElement('button');
    closeAllBtn.className = 'icon-btn close';
    closeAllBtn.title = 'Закрыть окно целиком';
    closeAllBtn.textContent = '×';
    closeAllBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      detachAttachLinks(fw);
      const gid = fw.groupId;
      floatingWindows = floatingWindows.filter(w => w.id !== fw.id);
      if (gid) { const rest = floatingWindows.filter(w => w.groupId === gid); if (rest.length === 1) rest[0].groupId = null; }
      render();
    });
    chrome.appendChild(closeAllBtn);
    chrome.addEventListener('pointerdown', (e) => {
      if (e.target === closeAllBtn) return;
      startFloatingDrag(e, fw, el, {
        onRename: () => startRename(title, fw.customName || '', (v) => { fw.customName = v || null; }),
        onText: e.target === title || title.contains(e.target),
      });
    });
    el.appendChild(chrome);

    // Body and resize handle are always built, even while collapsed — hiding
    // them via CSS (see applyCollapsedVisualState) instead of skipping their
    // creation means toggling collapse never has to rebuild the nested tree.
    const body = document.createElement('div');
    body.className = 'floating-body';
    renderWorkspace(fw.id, fw.tree, body);
    el.appendChild(body);
    const corner = document.createElement('div');
    corner.className = 'resize-corner';
    corner.addEventListener('pointerdown', (e) => startFloatingResize(e, fw, el));
    el.appendChild(corner);

    applyCollapsedVisualState(el, fw);
    return el;
  }

  // Toggles the collapsed look on an already-rendered floating window without
  // touching its (possibly complex, nested) body — pure CSS display + a
  // height/arrow update, so repeated collapse/expand stays instant regardless
  // of how much is docked inside the window.
  function applyCollapsedVisualState(el, fw) {
    el.classList.toggle('collapsed', fw.collapsed);
    el.style.height = fw.collapsed ? 'auto' : fw.h + 'px';
    const body = el.querySelector('.floating-body');
    const corner = el.querySelector('.resize-corner');
    const arrow = el.querySelector('.floating-chrome .arrow');
    if (body) body.style.display = fw.collapsed ? 'none' : '';
    if (corner) corner.style.display = fw.collapsed ? 'none' : '';
    if (arrow) arrow.textContent = fw.collapsed ? '▸' : '▾';
  }
  function toggleFloatingCollapse(fw) {
    fw.collapsed = !fw.collapsed;
    const el = floatingLayer.querySelector('.floating-window[data-float-id="' + fw.id + '"]');
    if (el) applyCollapsedVisualState(el, fw);
    restackBottomChain(fw);
    updateJson();
  }

  // A tap toggles collapse (locally refreshed, cascading any bottom-attached
  // neighbors so they follow the moving edge instead of leaving a gap).
  // A double-tap always renames. A hold only does something when the window
  // is currently docked to another one — it detaches it.
  function startFloatingDrag(e, fw, el, opts) {
    e.preventDefault();
    let captureEl = e.currentTarget;
    const pointerId = e.pointerId;
    captureEl.setPointerCapture(pointerId);
    const startX = e.clientX, startY = e.clientY;
    let moved = false, treeTarget = null, snapTarget = null;

    let origins;
    function snapshotOrigins() {
      const ids = fw.groupId ? floatingWindows.filter(f => f.groupId === fw.groupId).map(f => f.id) : [fw.id];
      origins = new Map();
      ids.forEach(id => { const f = floatingWindows.find(x => x.id === id); if (f) origins.set(id, { x: f.x, y: f.y }); });
    }
    snapshotOrigins();

    function clearHold() { if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; } }
    function endGesture() {
      clearHold();
      try { captureEl.releasePointerCapture(pointerId); } catch (err) {}
      captureEl.removeEventListener('pointermove', onMove);
      captureEl.removeEventListener('pointerup', onUp);
      if (dockOverlay) dockOverlay.style.display = 'none';
      hideSnapHighlight();
    }
    // Hold only ever fires when this window is currently docked to another one.
    // Rather than ending the gesture, it detaches the window in place and — without
    // letting go of the pointer — re-targets the same ongoing drag at the freshly
    // detached window, so it immediately sticks to the cursor/finger for the rest
    // of the move instead of requiring a separate press-and-drag afterwards.
    let holdTimer = fw.groupId ? setTimeout(() => {
      clearHold();
      detachFloating(fw);
      moved = true; // the remainder of this gesture is a plain move, never a tap/rename
      hideSnapHighlight();
      if (dockOverlay) dockOverlay.style.display = 'none';
      render();
      const freshEl = floatingLayer.querySelector('.floating-window[data-float-id="' + fw.id + '"]');
      const freshChrome = freshEl && freshEl.querySelector('.floating-chrome');
      if (freshChrome) {
        captureEl.removeEventListener('pointermove', onMove);
        captureEl.removeEventListener('pointerup', onUp);
        el = freshEl;
        captureEl = freshChrome;
        try { captureEl.setPointerCapture(pointerId); } catch (err) {}
        captureEl.addEventListener('pointermove', onMove);
        captureEl.addEventListener('pointerup', onUp);
      }
      snapshotOrigins();
    }, HOLD_MS) : null;

    function onMove(ev) {
      const dx = ev.clientX - startX, dy = ev.clientY - startY;
      if (!moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) { moved = true; clearHold(); }
      if (!moved) return;

      origins.forEach((orig, id) => {
        const f = floatingWindows.find(x => x.id === id);
        if (!f) return;
        f.x = orig.x + dx; f.y = orig.y + dy;
        syncFloatingDom(f);
      });

      snapTarget = findFloatingSnapTarget(fw);
      if (snapTarget) {
        showSnapHighlight(fw, snapTarget);
        if (dockOverlay) dockOverlay.style.display = 'none';
        treeTarget = null;
      } else {
        hideSnapHighlight();
        if (!fw.groupId) {
          treeTarget = detectDropTarget(ev.clientX, ev.clientY, el);
          showDockOverlayFor(treeTarget);
        } else {
          treeTarget = null;
        }
      }
    }
    function onUp() {
      endGesture();
      if (moved && snapTarget) {
        applyFloatingSnap(fw, snapTarget);
        render();
      } else if (moved && treeTarget) {
        floatingWindows = floatingWindows.filter(w => w.id !== fw.id);
        applyDropTarget(treeTarget, fw.tree);
        render();
      } else if (!moved) {
        if (!opts.onText) {
          // outside the title text — always an instant collapse, no double-tap wait at all
          toggleFloatingCollapse(fw);
        } else {
          const now = Date.now();
          const last = captureEl._lastTapTime || 0;
          if ((now - last) < DOUBLE_TAP_MS) {
            captureEl._lastTapTime = 0;
            if (captureEl._tapTimer) { clearTimeout(captureEl._tapTimer); captureEl._tapTimer = null; }
            opts.onRename();
          } else {
            captureEl._lastTapTime = now;
            captureEl._tapTimer = setTimeout(() => { captureEl._tapTimer = null; toggleFloatingCollapse(fw); }, TAP_DELAY_MS);
          }
        }
      }
    }
    captureEl.addEventListener('pointermove', onMove);
    captureEl.addEventListener('pointerup', onUp);
  }

  function startFloatingResize(e, fw, el) {
    e.preventDefault();
    e.stopPropagation();
    const captureEl = e.currentTarget;
    captureEl.setPointerCapture(e.pointerId);
    const startX = e.clientX, startY = e.clientY;
    const origW = fw.w, origH = fw.h;
    document.body.style.userSelect = 'none';
    function onMove(ev) {
      fw.w = Math.max(FLOAT_MIN_W, origW + (ev.clientX - startX));
      fw.h = Math.max(FLOAT_MIN_H, origH + (ev.clientY - startY));
      el.style.width = fw.w + 'px';
      el.style.height = fw.h + 'px';
      verticalChainWidthSync(fw);
      restackRightChain(fw);
      restackBottomChain(fw);
    }
    function onUp(ev) {
      captureEl.releasePointerCapture(ev.pointerId);
      captureEl.removeEventListener('pointermove', onMove);
      captureEl.removeEventListener('pointerup', onUp);
      document.body.style.userSelect = '';
      updateJson();
    }
    captureEl.addEventListener('pointermove', onMove);
    captureEl.addEventListener('pointerup', onUp);
  }

  // ---------- toolbar ----------
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('pointerdown', (e) => {
      startNodeDrag(e, () => `new:${chip.dataset.new}:${chip.dataset.label}`, {
        ghostLabel: chip.dataset.label,
        onNoTargetDrop: (x, y) => {
          const node = makeLeaf(chip.dataset.new, chip.dataset.label);
          floatingWindows.push(makeFloatingWindow(node, x - 70, y - 14, 220, 160));
          render();
        },
      });
    });
  });
  document.getElementById('toggle-json').addEventListener('click', () => {
    document.getElementById('json-panel').classList.toggle('open');
  });
  document.getElementById('reset-layout').addEventListener('click', () => {
    mainTree = defaultMainTree();
    floatingWindows = [];
    floatIdCounter = 1;
    nextGroupId = 1;
    render();
  });

  render();
})();
</script>
</body>
</html>
